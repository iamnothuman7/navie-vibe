<!-- ══════════════════════════════════════════════════════════════
     MODAL PEQUENO DE SUCESSO COM ANIMAÇÃO PREMIUM DE CHECKMARK (V)
══════════════════════════════════════════════════════════════ -->
<div id="successCartModal" 
     class="fixed inset-0 z-[400] hidden items-center justify-center bg-black/45 backdrop-blur-sm transition-all duration-300">
    
    <!-- Card do Modal -->
    <div class="bg-white rounded-[2rem] p-8 max-w-[280px] w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.2)] flex flex-col items-center justify-center relative overflow-hidden animate-in fade-in zoom-in-95 duration-200">
        
        <!-- Animação do Vzinho (Checkmark SVG Premium) -->
        <div class="checkmark-wrapper mb-5">
            <svg class="checkmark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>

        <!-- Texto de Sucesso -->
        <h3 class="text-lg font-black text-gray-900 leading-tight tracking-tight">
            Adicionado ao Carrinho!
        </h3>
        <p class="text-xs text-gray-400 font-bold mt-1.5 leading-normal">
            Sua reserva foi incluída com sucesso.
        </p>

    </div>
</div>

<!-- Estilos CSS da Animação do Checkmark (V) -->
<style>
    .checkmark-wrapper {
        width: 80px;
        height: 80px;
        position: relative;
    }
    
    .checkmark-svg {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: block;
        stroke-width: 4;
        stroke: var(--brand-color, #2563eb);
        stroke-miterlimit: 10;
        box-shadow: inset 0px 0px 0px var(--brand-color, #2563eb);
        animation: fill-success 0.4s ease-in-out 0.4s forwards, scale-success 0.3s ease-in-out 0.9s both;
        margin: 0 auto;
    }
    
    .checkmark-circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 4;
        stroke-miterlimit: 10;
        stroke: var(--brand-color, #2563eb);
        fill: none;
        animation: stroke-success 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }
    
    .checkmark-check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        stroke: #ffffff;
        animation: stroke-success 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    @keyframes stroke-success {
        100% { stroke-dashoffset: 0; }
    }
    
    @keyframes scale-success {
        0%, 100% { transform: none; }
        50% { transform: scale3d(1.1, 1.1, 1); }
    }
    
    @keyframes fill-success {
        100% { box-shadow: inset 0px 0px 0px 40px var(--brand-color, #2563eb); }
    }
</style>

<!-- Lógica do Modal de Sucesso -->
<script>
    window.showSuccessModal = function() {
        const successModal = document.getElementById('successCartModal');
        if (!successModal) return;
        
        // Reset classes
        successModal.classList.remove('hidden', 'animate-out', 'fade-out', 'duration-300');
        successModal.classList.add('flex');
        
        // Reiniciar animação do SVG recriando o elemento
        const wrapper = successModal.querySelector('.checkmark-wrapper');
        if (wrapper) {
            const originalContent = wrapper.innerHTML;
            wrapper.innerHTML = '';
            // Force redraw
            void wrapper.offsetWidth;
            wrapper.innerHTML = originalContent;
        }

        // Fecha o modal suavemente após 2 segundos (2000ms)
        setTimeout(() => {
            successModal.classList.add('animate-out', 'fade-out', 'duration-300');
            setTimeout(() => {
                successModal.classList.remove('flex');
                successModal.classList.add('hidden');
            }, 300); // tempo da animação de fade-out
        }, 2000);
    };
</script>
