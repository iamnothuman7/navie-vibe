<div x-show="currentTab === 'quartos'" class="space-y-8" x-transition.opacity>
    <div class="flex items-center gap-3 mb-6">
        <div class="w-1.5 h-6 bg-action-blue rounded-full"></div>
        <h3 class="text-2xl md:text-3xl font-black text-gray-900 leading-tight">Escolha sua Experiência</h3>
    </div>
    
    <!-- Redesign Grid para estilo Airbnb (Cards verticais funcionam bem em grids de 2 ou 3 colunas) -->
    <!-- Vamos usar 2 colunas para focar bem nas fotos -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="lista-quartos">
        {% for quarto in quartos %}
        {% include 'hoteis/partials/quarto_card.html' with quarto=quarto hotel=hotel %}
        {% empty %}
        <div class="col-span-full py-16 text-center bg-slate-50 rounded-3xl border border-slate-100">
            <i data-lucide="bed-double" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
            <p class="text-gray-500 font-medium">Sem acomodações cadastradas no momento.</p>
        </div>
        {% endfor %}
    </div>
</div>
