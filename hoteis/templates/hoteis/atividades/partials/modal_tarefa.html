<div x-data="{ open: true }" x-show="open" class="fixed inset-0 z-[100] flex items-center justify-center p-4" x-cloak>
    <!-- Backdrop Blur -->
    <div class="absolute inset-0 bg-black/75 backdrop-blur-sm transition-opacity" @click="open = false; document.getElementById('modal-container').innerHTML = ''"></div>
    
    <!-- Modal Content Card -->
    <div class="bg-white dark:bg-[#121212] rounded-[2.5rem] shadow-2xl border border-slate-200/50 dark:border-white/10 w-full max-w-lg overflow-hidden relative z-10 p-8 transform transition-all duration-300 animate-in fade-in zoom-in-95"
         x-show="open"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-black text-slate-800 dark:text-white uppercase tracking-tight flex items-center gap-2">
                <span class="flex items-center text-brand" style="pointer-events:none;"><i data-lucide="{% if tarefa %}edit-3{% else %}plus-circle{% endif %}" class="w-6 h-6"></i></span>
                {% if tarefa %}Editar Atividade{% else %}Nova Atividade{% endif %}
            </h3>
            <button @click="open = false; document.getElementById('modal-container').innerHTML = ''" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-white/5 text-slate-400 hover:text-slate-600 dark:hover:text-white flex items-center justify-center transition-colors">
                <span class="flex items-center" style="pointer-events:none;"><i data-lucide="x" class="w-4 h-4"></i></span>
            </button>
        </div>
        
        <!-- Form -->
        <form 
            {% if tarefa %}
                hx-post="{% url 'hoteis:partner_editar_tarefa' tarefa.id %}"
            {% else %}
                hx-post="{% url 'hoteis:partner_criar_tarefa' %}"
            {% endif %}
            hx-target="#modal-container"
            class="space-y-5"
        >
            {% csrf_token %}
            
            <!-- Título -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Título da Atividade *</label>
                <input type="text" name="titulo" required value="{{ tarefa.titulo|default:'' }}" 
                       class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none" 
                       placeholder="Ex: Limpeza de Quarto, Trocar Chuveiro, etc.">
            </div>
            
            <!-- Descrição -->
            <div>
                <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Instruções / Descrição</label>
                <textarea name="descricao" rows="2" 
                          class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-semibold shadow-sm outline-none resize-none" 
                          placeholder="Detalhes operacionais adicionais para o funcionário...">{{ tarefa.descricao|default:'' }}</textarea>
            </div>
            
            <!-- Row: Prioridade e Status -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Prioridade</label>
                    <select name="prioridade" class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value="baixa" {% if tarefa.prioridade == 'baixa' %}selected{% endif %}>Baixa</option>
                        <option value="normal" {% if not tarefa or tarefa.prioridade == 'normal' %}selected{% endif %}>Normal</option>
                        <option value="alta" {% if tarefa.prioridade == 'alta' %}selected{% endif %}>Alta</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Status Operacional</label>
                    <select name="status" class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value="todo" {% if not tarefa or tarefa.status == 'todo' %}selected{% endif %}>A Fazer</option>
                        <option value="doing" {% if tarefa.status == 'doing' %}selected{% endif %}>Em Progresso</option>
                        <option value="done" {% if tarefa.status == 'done' %}selected{% endif %}>Concluído</option>
                    </select>
                </div>
            </div>
            
            <!-- Row: Prazo e Responsável -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Prazo de Entrega</label>
                    <input type="text" name="data_vencimento" id="date-picker-modal" 
                           value="{{ tarefa.data_vencimento|date:'Y-m-d'|default:data_inicial|default:'' }}" 
                           class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer" 
                           placeholder="Selecione a data">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Atribuir a (Equipe)</label>
                    <select name="responsavel_id" class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value="">Ninguém atribuído</option>
                        {% for e in equipe %}
                            <option value="{{ e.id }}" {% if tarefa.responsavel_id == e.id %}selected{% endif %}>{{ e.user.get_full_name|default:e.user.username }} ({{ e.get_role_display }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <!-- Row: Acomodação/Quarto e Reserva Contextual -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Acomodação (Quarto)</label>
                    <select name="unidade_id" class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value="">Sem quarto vinculado</option>
                        {% for u in unidades %}
                            <option value="{{ u.id }}" {% if tarefa.unidade_id == u.id %}selected{% endif %}>{{ u.identificador }} ({{ u.quarto.nome }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 dark:text-navie-textsec uppercase tracking-wider mb-2">Reserva Associada</label>
                    <select name="reserva_id" class="w-full input-glass rounded-2xl px-4 py-3 text-sm font-bold shadow-sm outline-none cursor-pointer">
                        <option value="">Sem reserva vinculada</option>
                        {% for r in reservas %}
                            <option value="{{ r.id }}" {% if tarefa.reserva_id == r.id %}selected{% endif %}>#{{ r.id|slice:":8"|upper }} ({{ r.unidade.identificador }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-4 pt-4 border-t border-slate-100 dark:border-white/5">
                <button type="button" @click="open = false; document.getElementById('modal-container').innerHTML = ''" 
                        class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-500 dark:text-navie-textsec hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                    Cancelar
                </button>
                <button type="submit" 
                        class="flex-1 py-4 rounded-2xl bg-brand hover:bg-brand/90 text-white font-black text-[10px] uppercase tracking-widest shadow-xl shadow-brand/20 hover:scale-[1.02] active:scale-95 transition-all">
                    {% if tarefa %}Salvar Alterações{% else %}Adicionar Atividade{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Inicializa Lucide no Modal recém-carregado
    if(typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
    // Inicializa o seletor de data flatpickr
    if (typeof flatpickr !== 'undefined') {
        flatpickr("#date-picker-modal", {
            locale: "pt",
            dateFormat: "Y-m-d",
            altInput: true,
            altFormat: "d/m/Y",
            disableMobile: "true"
        });
    }
</script>
